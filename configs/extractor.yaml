model: sam_base

sam_tiny:
  encoder:
    img_size: 256
    embed_dim: 192
    out_chans: 192
    depth: 12
    num_heads: 3
    patch_size: 16
    global_attn_indexes: [2, 5, 8, 11]
    window_size: 8
    mlp_ratio: 4
    qkv_bias: True
    use_rel_pos: True
  pixel_decoder:
    upscale_stages: [4, 2, 2]  # 4*2*2 = x16 (patch size)
    embed_dim: 192  # = encoder.out_chans
    nbits: 16
    sigmoid_output: False
    upscale_type: 'bilinear'  # 'pixelshuffle', 'nearest', 'conv',  'bilinear'

sam_small:
  encoder:
    img_size: 256
    embed_dim: 384
    out_chans: 384
    depth: 12
    num_heads: 6
    patch_size: 16
    global_attn_indexes: [2, 5, 8, 11]
    window_size: 8
    mlp_ratio: 4
    qkv_bias: True
    use_rel_pos: True
  pixel_decoder:
    upscale_stages: [4, 2, 2]  # 4*2*2 = x16 (patch size)
    embed_dim: 384  # = encoder.out_chans
    nbits: 16
    sigmoid_output: False
    upscale_type: 'bilinear'  # 'pixelshuffle', 'nearest', 'conv',  'bilinear'

sam_base:
  encoder:
    img_size: 256
    embed_dim: 768
    out_chans: 768
    depth: 12
    num_heads: 12
    patch_size: 16
    global_attn_indexes: [2, 5, 8, 11]
    window_size: 8
    mlp_ratio: 4
    qkv_bias: True
    use_rel_pos: True
  pixel_decoder:
    upscale_stages: [4, 2, 2]  # 4*2*2 = x16 (patch size)
    embed_dim: 768  # = encoder.out_chans
    nbits: 16
    sigmoid_output: False
    upscale_type: 'bilinear'  # 'pixelshuffle', 'nearest', 'conv',  'bilinear'


u2netp:
  in_ch: 3
  out_ch: 1

sam_base_128:
  encoder:
    img_size: 256
    embed_dim: 768
    out_chans: 768
    depth: 12
    num_heads: 12
    patch_size: 16
    global_attn_indexes: [2, 5, 8, 11]
    window_size: 8
    mlp_ratio: 4
    qkv_bias: True
    use_rel_pos: True
  pixel_decoder:
    upscale_stages: [4, 2, 2]  # 4*2*2 = x16 (patch size)
    embed_dim: 768  # = encoder.out_chans
    embed_stages: [2, 2, 2]  # 4*2*2 = x16 (patch size)
    nbits: 16
    sigmoid_output: False
    upscale_type: 'bilinear'  # 'pixelshuffle', 'nearest', 'conv',  'bilinear'

sam_large:
  encoder:
    img_size: 256
    embed_dim: 1024
    out_chans: 1024
    depth: 22
    num_heads: 16
    patch_size: 16
    global_attn_indexes: [5, 11, 17, 21]  # evenly spaced global attention in 24 blocks
    window_size: 8
    mlp_ratio: 4
    qkv_bias: True
    use_rel_pos: True

  pixel_decoder:
    upscale_stages: [4, 2, 2]   # same as small/base
    embed_dim: 1024             # must match encoder.out_chans
    nbits: 64
    sigmoid_output: False
    upscale_type: 'bilinear'

sam_huge:
  encoder:
    img_size: 256
    embed_dim: 1280
    out_chans: 1280
    depth: 32
    num_heads: 16
    patch_size: 16
    global_attn_indexes: [7, 15, 23, 31]  # evenly spaced global attention in 24 blocks
    window_size: 8
    mlp_ratio: 4
    qkv_bias: True
    use_rel_pos: True

  pixel_decoder:
    upscale_stages: [4, 2, 2]   # same as small/base
    embed_dim: 1280             # must match encoder.out_chans
    nbits: 64
    sigmoid_output: False
    upscale_type: 'bilinear'